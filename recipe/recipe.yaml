# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.35.0"
  maturin_min: "1.5"
  maturin_max: "2.0"
  python_check_max: "3.14"
  unix_sp_dir: $(python -c "print(__import__('site').getsitepackages()[-1])")
  win_sp_dir: Lib\site-packages
  sp_dir: ${{ unix_sp_dir if unix else "%PREFIX%\\" ~ win_sp_dir }}
  abi3_bin: extension.${{ "abi3.so" if unix else "pyd" }}

package:
  name: tach
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tach/tach-${{ version }}.tar.gz
  sha256: db8594820685f8ce316ef45d4dfa1a8ed39ce97dd873aa5006800d2668c3b3bb

build:
  number: 0
  skip: is_abi3 and not is_python_min
  python:
    version_independent: ${{ is_abi3 }}
    entry_points:
      - tach = tach.start:start
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO: cargo-auditable-wrapper${{ ".bat" if win }}
      PYTHONIOENCODING: utf-8
      PYTHONLEGACYTEXTENCODING: utf-8
    content:
      - if: win
        then:
          - set CARGO_HOME=c:\.cg
          - md %CARGO_HOME%
          - copy "%RECIPE_DIR%\cargo-auditable-wrapper.bat" "%BUILD_PREFIX%\Library\bin\cargo-auditable-wrapper.bat"
        else:
          - cp "${RECIPE_DIR}/cargo-auditable-wrapper.sh" "${BUILD_PREFIX}/bin/cargo-auditable-wrapper"
          - chmod 755 "${BUILD_PREFIX}/bin/cargo-auditable-wrapper"
      - ${{ PYTHON }} -m pip install . --vv --no-deps --no-build-isolation --disable-pip-version-check
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("rust") }}
    - ${{ stdlib("c") }}
    - cargo-bundle-licenses
    - cargo-auditable
  host:
    - maturin >=${{ maturin_min }},<${{ maturin_max }}
    - pip
    - python
    - if: is_abi3
      then:
        - python-abi3
  run:
    - gitpython >=3.1,<4.0
    - networkx >=2.6,<4.0
    - prompt-toolkit >=3.0,<4.0
    - pydot >=2,<5
    - python
    - pyyaml >=6.0,<7.0
    - rich >=13.0
    - tomli >=1.2.2
    - tomli-w >=1.0,<2.0

tests:
  - if: is_abi3
    then:
      python:
        imports: tach
        pip_check: true
        python_version:
          - ${{ python_min }}.*
          - ${{ python_check_max }}.*
    else:
      python:
        imports: tach
        pip_check: true
  - files:
      source:
        - python/tests/
        - Cargo.toml
        - pyproject.toml
    requirements:
      run:
        - coverage
        - pytest
        - pytest-mock
        - if: is_abi3
          then:
            - abi3audit
            - python !=${{ python_min }}.*
    script:
      - tach --help
      - tach --version
      - tach --version | python -c "import sys; assert '${{ version }}' in sys.stdin.read()"
      - if: is_abi3
        then:
          - cd "${{ sp_dir }}" && cd tach
          - abi3audit -s -v --assume-minimum-abi3 ${{ python_min }} ${{ abi3_bin }}
      - coverage run --source=tach --branch -m pytest -vv --tb=long --color=yes -k "not export_report_diagnostics"
      - coverage report --show-missing --skip-covered --fail-under=47

about:
  summary: A Python tool to maintain a modular package architecture.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://pypi.org/project/tach
  repository: https://github.com/tach-org/tach
  documentation: https://docs.gauge.sh

extra:
  recipe-maintainers:
    - bollwyvl
